<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <!-- White background container -->
  <rect x="5" y="5" width="490" height="110" fill="white" stroke="black" stroke-width="6" />
  
  <!-- "I-SUCCESS" bold display text with lightning separator -->
  <text x="250" y="85" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="64" fill="black" text-anchor="middle" letter-spacing="-2">
    I-SUCCESS
  </text>
  
  <!-- Centered bottom "NODE" black badge -->
  <rect x="145" y="100" width="210" height="40" fill="black" />
  <text x="250" y="128" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="white" text-anchor="middle" letter-spacing="8">
    NODE
  </text>
</svg>
